<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Session Timer</title>
    <meta
      name="description"
      content="A clean focus session timer with a built-in study log."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Focus timer application">
      <section class="card timer-card" aria-labelledby="timer-heading">
        <h1 id="timer-heading">Focus Session Timer</h1>
        <p class="subtitle">Track focused work and keep a simple study log.</p>

        <div class="time-display" id="time-display" aria-live="polite">25:00</div>

        <div class="session-config">
          <label for="clock-dial">Session Length</label>
          <div class="clock-picker" aria-live="polite">
            <svg
              id="clock-dial"
              class="clock-dial"
              viewBox="0 0 220 220"
              role="slider"
              aria-label="Session length in minutes"
              aria-valuemin="1"
              aria-valuemax="60"
              aria-valuenow="25"
              tabindex="0"
            >
              <circle class="clock-face" cx="110" cy="110" r="92"></circle>
              <g id="clock-ticks"></g>
              <line id="clock-hand" class="clock-hand" x1="110" y1="110" x2="110" y2="42"></line>
              <circle class="clock-center" cx="110" cy="110" r="6"></circle>
            </svg>
            <p class="clock-value"><span id="duration-value">25</span> min</p>
          </div>
        </div>

        <div class="controls">
          <button id="start" class="btn btn-primary" type="button">Start</button>
          <button id="pause" class="btn" type="button" disabled>Pause</button>
          <button id="reset" class="btn" type="button">Reset</button>
        </div>

        <div class="task-row">
          <label for="task">Session Topic</label>
          <input
            id="task"
            name="task"
            type="text"
            maxlength="120"
            placeholder="e.g., Review chapter 4 notes"
          />
        </div>
      </section>

      <section class="card log-card" aria-labelledby="log-heading">
        <div class="log-header">
          <h2 id="log-heading">Study Log</h2>
          <button id="clear-log" class="btn btn-danger" type="button">Clear Log</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Duration</th>
                <th>Topic</th>
              </tr>
            </thead>
            <tbody id="log-body">
              <tr class="empty-row">
                <td colspan="3">No completed sessions yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card notes-card" aria-labelledby="notes-heading">
        <div class="notes-header">
          <h2 id="notes-heading">Temporary Notes</h2>
          <button id="clear-notes" class="btn" type="button">Clear Notes</button>
        </div>

        <div class="notes-input-row">
          <label for="note-input">New Note</label>
          <textarea
            id="note-input"
            name="note-input"
            rows="4"
            maxlength="500"
            placeholder="Write a quick note for this study session"
          ></textarea>
        </div>

        <div class="notes-actions">
          <button id="add-note" class="btn btn-primary" type="button">Add Note</button>
        </div>

        <ul id="notes-list" class="notes-list" aria-label="Temporary notes list">
          <li class="empty-note">No notes yet.</li>
        </ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
